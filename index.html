<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Собери слово — Russian Word Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,600&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f5ead9;
    --paper:#fff8ee;
    --brown-900:#2e1e12;
    --brown-800:#4a3221;
    --brown-700:#6b4a2f;
    --brown-500:#9c6b3f;
    --brown-300:#c99b66;
    --brown-200:#e3c39a;
    --accent:#c1592f;
    --accent-2:#7a8c5c;
    --gold:#d4a24c;
    --ok:#7a8c5c;
    --bad:#b6452f;
    --shadow: 0 18px 40px rgba(46,30,18,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(212,162,76,0.18), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(193,89,47,0.15), transparent 50%),
      var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--brown-900);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 60px;
    overflow-x:hidden;
  }
  .bg-texture{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(74,50,33,0.02) 0px, rgba(74,50,33,0.02) 2px, transparent 2px, transparent 12px);
  }

  header{text-align:center; margin:10px 0 20px; position:relative; z-index:1;}
  header .kicker{
    font-size:13px; letter-spacing:3px; text-transform:uppercase;
    color:var(--brown-500); font-weight:800; margin-bottom:6px;
  }
  h1{
    font-family:'Playfair Display', serif; font-weight:900;
    font-size:clamp(30px,7vw,48px); margin:0; color:var(--brown-900);
  }
  h1 span{color:var(--accent); font-style:italic;}
  .subtitle{color:var(--brown-700); font-size:15px; margin-top:6px; font-weight:600;}

  .progress-wrap{width:min(560px,92vw); margin:0 0 20px; z-index:1;}
  .progress-track{
    height:10px; background:var(--brown-200); border-radius:20px; overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(0,0,0,0.12);
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg,var(--gold),var(--accent));
    border-radius:20px; transition:width .4s ease;
  }
  .progress-label{
    display:flex; justify-content:space-between; font-size:12px; font-weight:800;
    color:var(--brown-700); margin-top:6px; letter-spacing:0.5px;
  }

  .board{
    width:min(480px,94vw);
    background:linear-gradient(160deg,var(--paper),#fbf1e2 60%, var(--brown-200) 150%);
    border-radius:28px;
    box-shadow:var(--shadow);
    border:1px solid rgba(74,50,33,0.08);
    padding:30px 24px 26px;
    display:flex; flex-direction:column; align-items:center;
    position:relative;
    z-index:1;
    transition: transform .18s ease;
  }
  .board.shake{ animation: shakeX .4s ease; }
  @keyframes shakeX{
    10%,90%{transform:translateX(-4px);}
    20%,80%{transform:translateX(6px);}
    30%,50%,70%{transform:translateX(-10px);}
    40%,60%{transform:translateX(10px);}
  }
  .board::before{
    content:''; position:absolute; inset:12px; border:2px dashed var(--brown-300);
    border-radius:20px; opacity:.5; pointer-events:none;
  }

  .emoji-big{font-size:88px; line-height:1; filter:drop-shadow(0 8px 14px rgba(0,0,0,0.18));}
  .translation{
    margin-top:6px; font-size:15px; font-weight:800; color:var(--brown-500);
    text-transform:uppercase; letter-spacing:1.5px;
  }

  .hint-row{display:flex; gap:10px; margin-top:14px; align-items:center;}
  .icon-btn{
    width:44px; height:44px; border-radius:50%; border:none;
    background:var(--brown-900); color:var(--gold); font-size:18px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 6px 14px rgba(46,30,18,0.3);
  }
  .icon-btn:active{transform:scale(0.9);}
  .icon-btn.secondary{
    background:var(--paper); color:var(--brown-700); border:2px solid var(--brown-300);
    box-shadow:none;
  }

  .slots{
    display:flex; gap:8px; margin-top:22px; flex-wrap:wrap; justify-content:center;
    min-height:56px;
  }
  .slot{
    width:44px; height:52px; border-radius:10px;
    border:2px solid var(--brown-300);
    background:rgba(255,255,255,0.5);
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display', serif; font-weight:800; font-size:24px;
    color:var(--brown-900);
    cursor:pointer;
    transition: all .15s ease;
  }
  .slot.filled{
    background:var(--paper); border-style:solid; border-color:var(--brown-700);
  }
  .slot.correct{ border-color:var(--ok); background:#eaf0e0; color:var(--ok); }
  .slot.wrong{ border-color:var(--bad); background:#f6e2dc; color:var(--bad); }
  .slot.space{
    border:none; background:none; box-shadow:none; width:18px; cursor:default;
  }

  .tray{
    display:flex; gap:10px; margin-top:28px; flex-wrap:wrap; justify-content:center;
    max-width:380px;
  }
  .tile{
    width:48px; height:52px; border-radius:12px;
    background:linear-gradient(160deg,var(--brown-800),var(--brown-900));
    color:var(--gold);
    font-family:'Playfair Display', serif; font-weight:800; font-size:24px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(46,30,18,0.3);
    transition: all .15s ease;
    user-select:none;
  }
  .tile:hover{transform:translateY(-3px);}
  .tile.used{ opacity:0; pointer-events:none; transform:scale(0.5); }

  .controls-row{
    display:flex; align-items:center; gap:20px; margin-top:30px; z-index:1;
  }
  .nav-btn{
    width:50px;height:50px;border-radius:50%;
    border:2px solid var(--brown-700); background:var(--paper); color:var(--brown-800);
    font-size:19px; font-weight:900; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 14px rgba(74,50,33,0.15);
  }
  .nav-btn:disabled{opacity:.3; cursor:default;}

  .status-msg{
    margin-top:16px; font-size:14px; font-weight:800; letter-spacing:.5px;
    color:var(--brown-500); min-height:20px; z-index:1;
  }
  .status-msg.ok{color:var(--ok);}
  .status-msg.bad{color:var(--bad);}

  .word-grid{
    margin-top:34px; width:min(560px,94vw);
    display:grid; grid-template-columns:repeat(auto-fill,minmax(34px,1fr));
    gap:8px; z-index:1;
  }
  .grid-item{
    aspect-ratio:1; border-radius:10px; background:var(--paper);
    border:2px solid var(--brown-200); display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; transition:all .15s ease;
  }
  .grid-item.done{background:var(--brown-800); border-color:var(--brown-800);}
  .grid-item.current{background:var(--accent); border-color:var(--accent); transform:scale(1.12);}

  .confetti{
    position:fixed; top:-20px; z-index:50; font-size:22px;
    animation:fall linear forwards; pointer-events:none;
  }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(360deg); opacity:0.9; } }

  .finish-banner{
    margin-top:30px; text-align:center; font-family:'Playfair Display', serif;
    font-size:22px; font-weight:800; color:var(--accent); z-index:1; animation:pop .5s ease;
  }
  @keyframes pop{
    0%{transform:scale(0.7); opacity:0;}
    70%{transform:scale(1.05);}
    100%{transform:scale(1); opacity:1;}
  }

  @media (max-width:420px){
    .emoji-big{font-size:70px;}
    .slot{width:38px; height:46px; font-size:20px;}
    .tile{width:42px; height:46px; font-size:20px;}
  }
</style>
</head>
<body>
<div class="bg-texture"></div>

<header>
  <div class="kicker">Русская лексика</div>
  <h1>Собери <span>слово</span></h1>
  <div class="subtitle">Build the Russian word from the letters</div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label">
    <span id="progressText">Word 1 of 19</span>
    <span id="progressPercent">5%</span>
  </div>
</div>

<div class="board" id="board">
  <div class="emoji-big" id="emojiBig">🐱</div>
  <div class="translation" id="translation">CAT</div>
  <div class="hint-row">
    <button class="icon-btn" id="speakBtn" title="Hear the word">🔊</button>
    <button class="icon-btn secondary" id="clearBtn" title="Clear">↺</button>
  </div>

  <div class="slots" id="slots"></div>
  <div class="tray" id="tray"></div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<div class="controls-row">
  <button class="nav-btn" id="prevBtn">←</button>
  <button class="nav-btn" id="nextBtn">→</button>
</div>

<div class="word-grid" id="wordGrid"></div>
<div class="finish-banner" id="finishBanner" style="display:none;">🎉 Ты собрал все слова! You've built every word!</div>

<script>
const WORDS = [
  {word:'кот', emoji:'🐱', translation:'cat'},
  {word:'дом', emoji:'🏠', translation:'house'},
  {word:'сыр', emoji:'🧀', translation:'cheese'},
  {word:'чай', emoji:'🍵', translation:'tea'},
  {word:'лук', emoji:'🧅', translation:'onion'},
  {word:'лес', emoji:'🌲', translation:'forest'},
  {word:'рыба', emoji:'🐟', translation:'fish'},
  {word:'луна', emoji:'🌙', translation:'moon'},
  {word:'рука', emoji:'✋', translation:'hand'},
  {word:'мама', emoji:'👩', translation:'mom'},
  {word:'стул', emoji:'🪑', translation:'chair'},
  {word:'книга', emoji:'📚', translation:'book'},
  {word:'звезда', emoji:'⭐', translation:'star'},
  {word:'яблоко', emoji:'🍎', translation:'apple'},
  {word:'солнце', emoji:'☀️', translation:'sun'},
  {word:'цветок', emoji:'🌸', translation:'flower'},
  {word:'машина', emoji:'🚗', translation:'car'},
  {word:'корова', emoji:'🐄', translation:'cow'},
  {word:'собака', emoji:'🐶', translation:'dog'},
  {word:'хочу', emoji:'🙋', translation:'I want'},
  {word:'могу', emoji:'💪', translation:'I can'},
  {word:'нужно', emoji:'❗', translation:'necessary'},
  {word:'знаю', emoji:'🧠', translation:'I know'},
  {word:'думаю', emoji:'🤔', translation:'I think'},
  {word:'попробую', emoji:'🎯', translation:"I'll try"},
  {word:'готов', emoji:'✅', translation:'ready'},
  {word:'помощь', emoji:'🆘', translation:'help'},
  {word:'работа', emoji:'💼', translation:'work'},
  {word:'вопрос', emoji:'❓', translation:'question'},
  {word:'проблема', emoji:'⚠️', translation:'problem'},
  {word:'сегодня', emoji:'📅', translation:'today'},
  {word:'завтра', emoji:'🌅', translation:'tomorrow'},
  {word:'может быть', emoji:'🤷', translation:'maybe'},
  {word:'потому что', emoji:'🔗', translation:'because'},
];

const LETTER_NAMES = {
  'а':'а','б':'бэ','в':'вэ','г':'гэ','д':'дэ','е':'е','ё':'ё','ж':'жэ','з':'зэ',
  'и':'и','й':'и краткое','к':'ка','л':'эль','м':'эм','н':'эн','о':'о','п':'пэ',
  'р':'эр','с':'эс','т':'тэ','у':'у','ф':'эф','х':'ха','ц':'цэ','ч':'че','ш':'ша',
  'щ':'ща','ъ':'твёрдый знак','ы':'ы','ь':'мягкий знак','э':'э','ю':'ю','я':'я'
};

function speakLetter(char){
  speak(LETTER_NAMES[char.toLowerCase()] || char);
}

let idx = 0;
const seen = new Set();
let slotsFilled = []; // array of {char, tileIndex}
let tileOrder = [];   // shuffled chars for current word, with used flags
let locked = false;

const board = document.getElementById('board');
const emojiBig = document.getElementById('emojiBig');
const translation = document.getElementById('translation');
const slotsEl = document.getElementById('slots');
const trayEl = document.getElementById('tray');
const statusMsg = document.getElementById('statusMsg');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const progressPercent = document.getElementById('progressPercent');
const wordGrid = document.getElementById('wordGrid');
const finishBanner = document.getElementById('finishBanner');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildGrid(){
  wordGrid.innerHTML='';
  WORDS.forEach((w,i)=>{
    const el = document.createElement('div');
    el.className='grid-item';
    el.textContent = w.emoji;
    el.addEventListener('click', ()=>{ idx=i; loadWord(); });
    wordGrid.appendChild(el);
  });
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ru-RU';
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

function loadWord(){
  locked = false;
  const w = WORDS[idx];
  const chars = w.word.split('');
  slotsFilled = chars.map(c => c===' ' ? {char:' ', isSpace:true} : null);
  const letterChars = chars.filter(c => c !== ' ');
  tileOrder = shuffle(letterChars).map((c,i)=>({char:c, used:false, tileId:i}));

  emojiBig.textContent = w.emoji;
  translation.textContent = w.translation.toUpperCase();
  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';

  renderSlots();
  renderTray();
  updateProgressAndGrid();

  prevBtn.disabled = idx===0;
  nextBtn.disabled = idx===WORDS.length-1;
}

function renderSlots(){
  slotsEl.innerHTML = '';
  slotsFilled.forEach((s,i)=>{
    const el = document.createElement('div');
    if(s && s.isSpace){
      el.className = 'slot space';
      el.textContent = '';
    } else {
      el.className = 'slot' + (s ? ' filled' : '');
      el.textContent = s ? s.char : '';
      el.addEventListener('click', ()=>{ removeSlot(i); });
    }
    slotsEl.appendChild(el);
  });
}

function renderTray(){
  trayEl.innerHTML = '';
  tileOrder.forEach((t)=>{
    const el = document.createElement('div');
    el.className = 'tile' + (t.used ? ' used' : '');
    el.textContent = t.char;
    el.addEventListener('click', ()=>{ placeTile(t); });
    trayEl.appendChild(el);
  });
}

function placeTile(t){
  if(locked || t.used) return;
  const emptyIndex = slotsFilled.findIndex(s=>s===null);
  if(emptyIndex===-1) return;
  t.used = true;
  slotsFilled[emptyIndex] = {char:t.char, tileId:t.tileId};
  renderSlots();
  renderTray();
  speakLetter(t.char);

  if(slotsFilled.every(s=>s!==null)){
    checkAnswer();
  }
}

function removeSlot(i){
  if(locked) return;
  const s = slotsFilled[i];
  if(!s || s.isSpace) return;
  const tile = tileOrder.find(t=>t.tileId===s.tileId);
  if(tile) tile.used = false;
  slotsFilled[i] = null;
  renderSlots();
  renderTray();
  statusMsg.textContent='';
  statusMsg.className='status-msg';
}

function checkAnswer(){
  const attempt = slotsFilled.map(s=>s.char).join('');
  const target = WORDS[idx].word;
  locked = true;

  if(attempt === target){
    [...slotsEl.children].forEach(el=>el.classList.add('correct'));
    statusMsg.textContent = 'Верно! ✓ Well done!';
    statusMsg.className = 'status-msg ok';
    speak(target);
    seen.add(idx);
    updateProgressAndGrid();
    launchConfetti(18);

    if(seen.size===WORDS.length){
      setTimeout(()=>{ finishBanner.style.display='block'; launchConfetti(60); }, 500);
    } else {
      setTimeout(()=>{
        if(idx < WORDS.length-1){ idx++; loadWord(); }
      }, 1300);
    }
  } else {
    [...slotsEl.children].forEach(el=>el.classList.add('wrong'));
    statusMsg.textContent = 'Почти! Try again';
    statusMsg.className = 'status-msg bad';
    board.classList.add('shake');
    setTimeout(()=>{
      board.classList.remove('shake');
      slotsFilled = new Array(target.length).fill(null);
      tileOrder.forEach(t=>t.used=false);
      renderSlots();
      renderTray();
      locked = false;
      statusMsg.textContent='';
      statusMsg.className='status-msg';
    }, 900);
  }
}

function updateProgressAndGrid(){
  const pct = Math.round((seen.size/WORDS.length)*100);
  progressFill.style.width = pct + '%';
  progressText.textContent = `Word ${idx+1} of ${WORDS.length}`;
  progressPercent.textContent = pct + '%';

  [...wordGrid.children].forEach((el,i)=>{
    el.classList.toggle('current', i===idx);
    el.classList.toggle('done', seen.has(i) && i!==idx);
  });
}

document.getElementById('speakBtn').addEventListener('click', ()=> speak(WORDS[idx].word));
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(locked) return;
  slotsFilled = new Array(WORDS[idx].word.length).fill(null);
  tileOrder.forEach(t=>t.used=false);
  renderSlots();
  renderTray();
  statusMsg.textContent='';
  statusMsg.className='status-msg';
});

prevBtn.addEventListener('click', ()=>{ if(idx>0){ idx--; loadWord(); } });
nextBtn.addEventListener('click', ()=>{ if(idx<WORDS.length-1){ idx++; loadWord(); } });

function launchConfetti(n){
  const emojis = ['🎉','⭐','🍎','🌸','🎊','✨'];
  for(let i=0;i<n;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    c.style.left = Math.random()*100+'vw';
    c.style.animationDuration = (2.5+Math.random()*2)+'s';
    c.style.fontSize = (14+Math.random()*14)+'px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

buildGrid();
loadWord();
</script>
</body>
</html>
